name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install deps (CPU-only torch)
        run: |
          uv venv
          uv pip install --index-strategy unsafe-best-match \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            -e ".[serve,dev]"

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check .
          ruff format --check .

      - name: Type check
        run: |
          . .venv/bin/activate
          mypy src

      - name: Tests (includes export smoke test)
        run: |
          . .venv/bin/activate
          pytest -ra
